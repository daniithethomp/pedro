<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f2ef;

      #pedro-image {

    <img id="pedro-image" src="./pedro1.png" alt="Pedro" width="800" height="600">
    <script src="./pedro.js"></script>
